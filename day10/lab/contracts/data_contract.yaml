version: "1.1"
dataset: "kb_chunk_export"
owner_team: "CS + IT Helpdesk Data Platform"
description: "Canonical cleaned export for the Day 10 CS + IT Helpdesk corpus."

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "Stable deterministic chunk ID derived from doc_id + effective_date + content hash."
  doc_id:
    type: string
    required: true
    description: "Canonical logical source ID, aligned with grading expectations."
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true
  title:
    type: string
    required: true
  source_name:
    type: string
    required: true
  source_system:
    type: string
    required: true
  source_domain:
    type: string
    required: true
  source_path:
    type: string
    required: false
  cleaning_flags:
    type: string
    required: false

quality_rules:
  - id: "required_grading_sources_present"
    severity: "halt"
  - id: "no_stale_refund_or_hr_content"
    severity: "halt"
  - id: "metadata_completeness"
    severity: "halt"
  - id: "unique_chunk_id"
    severity: "warn"

freshness:
  measured_at: "publish"
  sla_hours: 24
  alert_channel: "lab-monitoring"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
    owner_team: "CS Operations"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
    owner_team: "IT Operations"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
    owner_team: "IT Helpdesk"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"
    owner_team: "HR Operations"
  - path: "data/docs/access_control_sop.txt"
    doc_id: "access_control_sop"
    owner_team: "IT Security"

allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy
  - access_control_sop

required_metadata_fields:
  - chunk_id
  - doc_id
  - chunk_text
  - effective_date
  - exported_at
  - title
  - source_name
  - source_system
  - source_domain
  - run_id
  - retriever

policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
  refund_current_window_days: 7
